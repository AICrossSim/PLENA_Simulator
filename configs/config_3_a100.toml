[BEHAVIOR.PRECISION.VECTOR_SRAM_TYPE.DATA_TYPE]
type = "Fp"
sign = true
exponent = 8
mantissa = 7

[BEHAVIOR.PRECISION.HBM_M_WEIGHT_TYPE]
format = "Mx"
block = 8
[BEHAVIOR.PRECISION.HBM_M_WEIGHT_TYPE.ELEM]
type = "Fp"
sign = true
exponent = 4
mantissa = 3
[BEHAVIOR.PRECISION.HBM_M_WEIGHT_TYPE.SCALE]
type = "Fp"
sign = false
exponent = 8
mantissa = 0

[BEHAVIOR.PRECISION.HBM_M_KV_TYPE]
