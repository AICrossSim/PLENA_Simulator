[BEHAVIOR.PRECISION.HBM_V_ACT_TYPE.SCALE]
type = "Fp"
sign = false
exponent = 8
mantissa = 0

[BEHAVIOR.PRECISION.HBM_V_KV_TYPE]
format = "Mx"
block = 8
[BEHAVIOR.PRECISION.HBM_V_KV_TYPE.ELEM]
type = "Fp"
sign = true
exponent = 4
mantissa = 3
[BEHAVIOR.PRECISION.HBM_V_KV_TYPE.SCALE]
