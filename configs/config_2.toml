sign = true
exponent = 4
mantissa = 3
[BEHAVIOR.PRECISION.HBM_M_WEIGHT_TYPE.SCALE]
type = "Fp"
sign = false
exponent = 8
mantissa = 0

[BEHAVIOR.PRECISION.HBM_M_KV_TYPE]
