# PLENA hardware config_2 — scaled-up BEHAVIOR profile
#
# Hardware footprint (vs config_1 in plena_settings.toml):
#   * BLEN=8                 (vs config_1 4   ⇒ ×2 systolic output width)
#   * HLEN=128               (vs config_1 16  ⇒ ×8 broadcast head granularity)
#   * VLEN=MLEN=1024         (vs config_1 64  ⇒ ×16 vector/matrix engine width)
#   * BROADCAST_AMOUNT=8     (vs config_1 4   ⇒ ×2 broadcast lanes;
#                             invariant `BROADCAST_AMOUNT * HLEN == MLEN`
#                             ⇒ 8 * 128 == 1024 ✓)
#   * MATRIX_SRAM_SIZE=4096  (vs config_1 256 ⇒ ×16, still 4 tiles of MLEN×MLEN)
#   * VECTOR_SRAM_SIZE=16384 (vs config_1 1024 ⇒ ×16; 16384 VLEN-wide fp16
#                             rows = 32 MiB; sized for BMM-based flash
#                             attention working set: q_tile + s_packed +
#                             o_packed + scratch)
#   * MAX_LOOP_INSTRUCTIONS=100000000 (vs default 10000 — raised so Phase-5
#                             multi-tile attention kernels with deeply nested
#                             T.serial loops don't trip the per-loop instr
#                             cap mid-run)
#   * HBM_WIDTH=1024         (vs config_1 512  ⇒ ×2 per-cycle bandwidth)
#   * HBM_M_Prefetch_Amount=1024 (= MLEN, one full row per cycle)
#   * HBM_V_Prefetch_Amount=HBM_V_Writeback_Amount=8 (= BLEN, BLEN-row burst)
#
# Schema note: the simulator's `load_config.rs::ConfigSection` deserialises
# each leaf as `{ value = <int> }` (nested table form). Don't use the flat
# `KEY = N` shorthand — `toml::from_str` will reject it.
#
# Activation:
#   PLENA_CONFIG=/abs/path/to/PLENA_Simulator-yw-online_emulator/configs/config_2.toml
#   ./transactional_emulator/start_online_sim.sh --gateway
#
# Per-session config handshake: the gateway picks this up via `cmd.env(
# "PLENA_CONFIG", path)` in `spawn_backend` (see main.rs); the backend
# child reads it via `load_config()` in load_config.rs.

# ============================================================================
# BEHAVIOR SIMULATOR CONFIGURATION (config_2)
# ============================================================================

[BEHAVIOR.CONFIG.DC_EN]
value = 1

[BEHAVIOR.CONFIG.MAX_LOOP_INSTRUCTIONS]
value = 100000000

[BEHAVIOR.CONFIG.BLEN]
value = 8

[BEHAVIOR.CONFIG.HLEN]
value = 128

[BEHAVIOR.CONFIG.MLEN]
value = 1024

[BEHAVIOR.CONFIG.VLEN]
value = 1024

[BEHAVIOR.CONFIG.BROADCAST_AMOUNT]
value = 8

[BEHAVIOR.CONFIG.HBM_SIZE]
value = 1073741824

[BEHAVIOR.CONFIG.HBM_WIDTH]
value = 1024

[BEHAVIOR.CONFIG.MATRIX_SRAM_SIZE]
value = 4096

[BEHAVIOR.CONFIG.VECTOR_SRAM_SIZE]
value = 16384

[BEHAVIOR.CONFIG.HBM_M_Prefetch_Amount]
value = 1024

[BEHAVIOR.CONFIG.HBM_V_Prefetch_Amount]
value = 8

[BEHAVIOR.CONFIG.HBM_V_Writeback_Amount]
value = 8

# Precision / latency carried over unchanged from plena_settings.toml's
# BEHAVIOR.* section. Kept verbatim so the simulator deserialiser sees a
# complete PlenaSettings struct (it requires every field of every nested
# config section — partial overrides aren't supported).

[BEHAVIOR.PRECISION.MATRIX_SRAM_TYPE]
format = "Plain"
[BEHAVIOR.PRECISION.MATRIX_SRAM_TYPE.DATA_TYPE]
type = "Fp"
sign = true
exponent = 8
mantissa = 7

[BEHAVIOR.PRECISION.VECTOR_SRAM_TYPE]
