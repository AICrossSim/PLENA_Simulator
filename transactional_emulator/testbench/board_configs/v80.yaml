# AMD/Xilinx Versal V80 — AI Edge accelerator
# Dedicated compute library available (dc_lib_en)

name: v80
description: Versal V80 AI Edge with dedicated compute blocks
vendor: amd
family: versal
part: v80

clock_mhz: 400

memory:
  hbm_size_bytes: 34359738368       # 32 GiB HBM2e
  hbm_width_bits: 512
  hbm_bandwidth_gbps: 819.2         # 32 pseudo-channels × 3.2 Gbps
  matrix_sram_tiles: 4096
  vector_sram_depth: 4194304
  hbm_m_prefetch_amount: 64
  hbm_v_prefetch_amount: 4
  hbm_v_writeback_amount: 4

precision:
  matrix_sram: {type: fp, sign: true, exponent: 8, mantissa: 7}
  vector_sram: {type: fp, sign: true, exponent: 8, mantissa: 7}
  hbm_act: {exponent: 4, mantissa: 3, scale_exponent: 8, block: 8}
  hbm_weight: {exponent: 4, mantissa: 3, scale_exponent: 8, block: 8}

latency:
  dc_lib_en: true
  systolic_processing_overhead: 0
  vector_add_cycles: 1
  vector_mul_cycles: 1
  vector_exp_cycles: 1
  vector_reci_cycles: 2
  vector_max_cycles: 4
  vector_sum_cycles: 8
  vector_shift_cycles: 1
  vector_prefix_scan_cycles: 9
  scalar_fp_basic_cycles: 1
  scalar_fp_exp_cycles: 1
  scalar_fp_sqrt_cycles: 1
  scalar_fp_reci_cycles: 1
  scalar_int_basic_cycles: 1

power:
  tdp_watts: 75
  io_voltage: 1.8

resources:
  luts: 899840
  ffs: 1799680
  bram_36k: 967
  uram: 463
  dsp58: 1968
  aie_tiles: 304

# Synthesis-proven tile configurations (tested on this board)
tile_hints:
  - {mlen: 64, vlen: 64, blen: 16, batch_size: 1, status: proven}
  - {mlen: 128, vlen: 128, blen: 64, batch_size: 1, status: proven}
  - {mlen: 256, vlen: 256, blen: 64, batch_size: 1, status: proven}
  - {mlen: 256, vlen: 256, blen: 64, batch_size: 2, status: untested}
