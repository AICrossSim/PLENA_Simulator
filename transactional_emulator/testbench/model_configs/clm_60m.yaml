# CLM-60M — Small causal LM for testing
# https://huggingface.co/AICrossSim/clm-60m

model_id: AICrossSim/clm-60m
nickname: clm60m
trust_remote_code: false
family: clm

architecture:
  text:
    hidden_size: 384
    inter_dim: 1408
    num_heads: 6
    num_kv_heads: 2
    head_dim: 64
    num_layers: 8
    rope_theta: 10000
    rms_norm_eps: 1.0e-5
    model_type: llama

# Default hardware config (native mlen=256 with GQA)
hardware:
  mode: native
  mlen: 256
  vlen: 256
  blen: 64
  batch_size: 1
  hlen: 64
  broadcast: 4    # >= GQA ratio (6/2 = 3)
  mram_tile_capacity: 16

hardware_presets:
  native_64x64x16_b1:
    mode: native
    mlen: 64
    vlen: 64
    blen: 16
    batch_size: 1
    hlen: 64
    broadcast: 1
    mram_tile_capacity: 4

  native_256x256x64_b1:
    mode: native
    mlen: 256
    vlen: 256
    blen: 64
    batch_size: 1
    hlen: 64
    broadcast: 4
    mram_tile_capacity: 16

  sliced_64x64x16_b1:
    mode: sliced
    mlen: 64
    vlen: 64
    blen: 16
    batch_size: 1
    hlen: 64
    broadcast: 1
    mram_tile_capacity: 4

  sliced_256x256x64_b1:
    mode: sliced
    mlen: 256
    vlen: 256
    blen: 64
    batch_size: 1
    hlen: 64
    broadcast: 4
    mram_tile_capacity: 16
