name: Transactional Emulator

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'transactional_emulator/**'
      - 'PLENA_Tools/**'
      - 'flake.nix'
      - 'flake.lock'
      - 'pyproject.toml'
      - 'uv.lock'
  pull_request:
    branches: [main]
    paths:
      - 'transactional_emulator/**'
      - 'PLENA_Tools/**'
      - 'flake.nix'
      - 'flake.lock'
      - 'pyproject.toml'
      - 'uv.lock'

jobs:
  rust-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Check formatting
        working-directory: transactional_emulator
        run: cargo fmt --all -- --check

  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Nix
        uses: cachix/install-nix-action@v30
        with:
          nix_path: nixpkgs=channel:nixos-25.05

      - name: Cache cargo registry and build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            transactional_emulator/target
          key: cargo-${{ runner.os }}-${{ hashFiles('transactional_emulator/Cargo.lock') }}
          restore-keys: |
            cargo-${{ runner.os }}-

      - name: Build Rust emulator
        run: |
          nix develop --command bash -c "cd transactional_emulator && cargo build --release"

      - name: Run Rust tests
        run: |
          nix develop --command bash -c "cd transactional_emulator && cargo test --release"

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python and install dependencies
        run: |
          uv python install 3.12
          uv sync

      - name: Run ATen linear integration test
        run: |
          nix develop --command bash -c "just test-aten-linear"
